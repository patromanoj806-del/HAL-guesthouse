<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Room - HAL Guest House</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0f172a,#1e40af);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:30px;}
.booking-card{width:1000px;background:rgba(255,255,255,.12);backdrop-filter:blur(15px);padding:35px;border-radius:25px;color:white;box-shadow:0 10px 30px rgba(0,0,0,.4);}
.logo{display:block;margin:auto;width:150px;margin-bottom:15px;}
.form-control,.form-select{height:50px;border-radius:12px;}
textarea.form-control{height:120px;}
.btn-book{height:55px;border:none;font-size:18px;font-weight:bold;border-radius:12px;background:#00c8ff;}
.btn-book:hover{background:#00a8d8;}
h2{text-align:center;margin-bottom:25px;}
</style>
</head>
<body>
<div class="booking-card">
  <img src="https://www.examveda.com/images/theory-image/current-affairs/2016/march/1458887454-hal-logo.png" class="logo">
  <h2>Guest House Room Booking</h2>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label>PB Number</label>
      <input type="text" id="pbNo" class="form-control" placeholder="Your PB Number">
    </div>
    <div class="col-md-6 mb-3">
      <label>Guest Name</label>
      <input type="text" id="guestName" class="form-control">
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label>Guest Mobile</label>
      <input type="tel" id="guestMobile" class="form-control">
    </div>
    <div class="col-md-6 mb-3">
      <label>Number of Guests</label>
      <input type="number" id="numberOfGuests" class="form-control" value="1" min="1">
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label>Check-In Date</label>
      <input type="date" id="checkIn" class="form-control">
    </div>
    <div class="col-md-6 mb-3">
      <label>Check-Out Date</label>
      <input type="date" id="checkOut" class="form-control">
    </div>
  </div>

  <div class="mb-3">
    <label>Room Type</label>
    <select id="roomType" class="form-select">
      <option value="">Select Room</option>
      <option value="SINGLE">Single Room - ₹1000/day</option>
      <option value="DOUBLE">Double Room - ₹1200/day</option>
      <option value="DELUXE">Deluxe Room - ₹1500/day</option>
      <option value="VIP_SUITE">VIP Suite - ₹2500/day</option>
    </select>
  </div>

  <div class="mb-3">
    <label>Purpose of Visit</label>
    <input type="text" id="purpose" class="form-control">
  </div>

  <div class="mb-3">
    <label>Special Requirements</label>
    <textarea id="specialReq" class="form-control"></textarea>
  </div>

  <button type="button" class="btn btn-book w-100" onclick="submitBooking()">
    Submit Booking Request
  </button>
</div>

<script>
function submitBooking() {
  const pbNo = document.getElementById("pbNo").value.trim();
  const guestName = document.getElementById("guestName").value.trim();
  const checkIn = document.getElementById("checkIn").value;
  const checkOut = document.getElementById("checkOut").value;
  const roomType = document.getElementById("roomType").value;

  if (!pbNo || !guestName || !checkIn || !checkOut || !roomType) {
    alert("Please fill all required fields.");
    return;
  }

  const payload = {
    pbNo: pbNo,
    guestName: guestName,
    guestMobile: document.getElementById("guestMobile").value,
    numberOfGuests: parseInt(document.getElementById("numberOfGuests").value) || 1,
    checkInDate: checkIn,
    checkOutDate: checkOut,
    preferredRoomType: roomType,
    purposeOfVisit: document.getElementById("purpose").value,
    specialRequirements: document.getElementById("specialReq").value
  };

  fetch("https://hal-backend-production.up.railway.app/api/bookings", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(data => {
    if (data.result === "BOOKING_SUBMITTED") {
      alert("Booking submitted! Your Booking ID: " + data.bookingId);
      window.location.href = "booking-status.html";
    } else {
      alert("Error: " + JSON.stringify(data));
    }
  })
  .catch(() => alert("Cannot connect to server. Make sure Spring Boot is running on port 8080."));
}
</script>
</body>
</html>
