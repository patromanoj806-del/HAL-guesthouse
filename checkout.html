<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAL Guest House - Check Out</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f4f7fc;font-family:'Segoe UI',sans-serif;}
.header{background:linear-gradient(135deg,#0f172a,#1e40af);color:white;padding:25px;text-align:center;}
.checkout-card{max-width:1000px;margin:30px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);}
.summary-box{background:#f8fafc;padding:20px;border-radius:15px;margin-top:20px;}
.btn-generate{background:#16a34a;color:white;font-size:18px;font-weight:bold;border:none;height:55px;}
.bill-value{font-size:22px;font-weight:bold;color:#1e40af;}
</style>
</head>
<body>
<div class="header">
  <h2>HAL Guest House Check-Out</h2>
  <p>Guest Departure & Bill Calculation</p>
</div>

<div class="checkout-card">
  <div class="row mb-3">
    <div class="col-md-8">
      <label>Booking ID</label>
      <input type="text" id="bookingId" class="form-control" placeholder="e.g. BK001">
    </div>
    <div class="col-md-4 d-flex align-items-end">
      <button class="btn btn-primary w-100" onclick="fetchBooking()">Fetch Details</button>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label>Guest Name</label>
      <input type="text" id="guestName" class="form-control" readonly>
    </div>
    <div class="col-md-6 mb-3">
      <label>Room Number</label>
      <input type="text" id="roomNo" class="form-control" readonly>
    </div>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label>Check-In Date</label>
      <input type="date" id="checkin" class="form-control" readonly>
    </div>
    <div class="col-md-6 mb-3">
      <label>Check-Out Date</label>
      <input type="date" id="checkout" class="form-control" readonly>
    </div>
  </div>

  <button type="button" class="btn btn-primary mb-3" onclick="calculateBill()">
    Calculate Bill
  </button>

  <div class="summary-box">
    <h4>Billing Summary</h4><hr>
    <p>Total Days: <span id="days" class="bill-value">0</span></p>
    <p>Room Charge Per Day: ₹<span id="rate" class="bill-value">0</span></p>
    <p>Room Amount: ₹<span id="amount" class="bill-value">0</span></p>
    <p>GST (18%): ₹<span id="gst" class="bill-value">0</span></p>
    <hr>
    <p><strong>Grand Total: ₹<span id="grandTotal" class="bill-value">0</span></strong></p>
  </div>

  <div class="mt-4">
    <button type="button" class="btn btn-generate w-100" onclick="checkout()">
      Generate Final Bill & Check Out
    </button>
  </div>
</div>

<script>
const API = "https://hal-backend-production.up.railway.app/api";
let bookingData = null;

async function fetchBooking() {
  const bookingId = document.getElementById("bookingId").value.trim();
  if (!bookingId) { alert("Enter a Booking ID"); return; }

  try {
    const r = await fetch(`${API}/bookings/${bookingId}`);
    if (!r.ok) throw new Error();
    bookingData = await r.json();

    document.getElementById("guestName").value = bookingData.guestName;
    document.getElementById("roomNo").value = bookingData.room?.roomNumber || 'N/A';
    document.getElementById("checkin").value = bookingData.checkInDate;
    document.getElementById("checkout").value = bookingData.checkOutDate;

    if (bookingData.status !== "CHECKED_IN") {
      alert("Warning: Status is " + bookingData.status + ". Guest must be CHECKED_IN to check out.");
    }
  } catch(e) {
    alert("Booking not found.");
  }
}

function calculateBill() {
  if (!bookingData) { alert("Fetch booking first"); return; }
  const checkin = new Date(document.getElementById("checkin").value);
  const checkout = new Date(document.getElementById("checkout").value);
  const rate = bookingData.room?.ratePerDay || 1500;
  const diff = Math.ceil((checkout - checkin) / (1000*60*60*24));
  const days = diff > 0 ? diff : 1;
  const amount = days * rate;
  const gst = Math.round(amount * 0.18);
  const grand = amount + gst;

  document.getElementById("days").textContent = days;
  document.getElementById("rate").textContent = rate;
  document.getElementById("amount").textContent = amount;
  document.getElementById("gst").textContent = gst;
  document.getElementById("grandTotal").textContent = grand;
}

async function checkout() {
  const bookingId = document.getElementById("bookingId").value.trim();
  if (!bookingId || !bookingData) { alert("Fetch booking first"); return; }

  try {
    // 1. Check out
    const r1 = await fetch(`${API}/bookings/${bookingId}/checkout`, { method: "PUT" });
    const d1 = await r1.json();
    if (d1.result !== "CHECKED_OUT") { alert("Checkout failed"); return; }

    // 2. Generate bill
    const r2 = await fetch(`${API}/bills/generate/${bookingId}`, { method: "POST" });
    const bill = await r2.json();

    alert(`✅ Guest Checked Out!\nBill No: ${bill.billNumber}\nGrand Total: ₹${bill.grandTotal}`);
    window.location.href = "bill-generation.html?billNumber=" + bill.billNumber;
  } catch(e) {
    alert("Cannot connect to server.");
  }
}
</script>
</body>
</html>
