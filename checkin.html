<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Check-In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f4f7fc;font-family:'Segoe UI',sans-serif;}
.header{background:linear-gradient(135deg,#0f172a,#1e40af);color:white;padding:25px;}
.card-box{max-width:900px;margin:30px auto;background:white;padding:30px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,.1);}
.btn-checkin{background:#16a34a;color:white;font-weight:bold;}
.info-box{background:#f8fafc;padding:15px;border-radius:10px;margin-bottom:15px;display:none;}
</style>
</head>
<body>
<div class="header">
  <h2>Guest Check-In</h2>
  <p>HAL Guest House Check-In Module</p>
</div>

<div class="card-box">
  <div class="row mb-3">
    <div class="col-md-8">
      <label>Booking ID</label>
      <input type="text" id="bookingId" class="form-control" placeholder="e.g. BK001">
    </div>
    <div class="col-md-4 d-flex align-items-end">
      <button class="btn btn-primary w-100" onclick="fetchBooking()">Fetch Details</button>
    </div>
  </div>

  <!-- Auto-filled details -->
  <div id="bookingInfo" class="info-box">
    <h5>Booking Details</h5>
    <div class="row">
      <div class="col-md-6"><p><strong>Guest Name:</strong> <span id="infoGuest"></span></p></div>
      <div class="col-md-6"><p><strong>Room Number:</strong> <span id="infoRoom"></span></p></div>
      <div class="col-md-6"><p><strong>Check-In Date:</strong> <span id="infoCheckIn"></span></p></div>
      <div class="col-md-6"><p><strong>Check-Out Date:</strong> <span id="infoCheckOut"></span></p></div>
      <div class="col-md-6"><p><strong>Status:</strong> <span id="infoStatus"></span></p></div>
      <div class="col-md-6"><p><strong>Employee PB No:</strong> <span id="infoEmp"></span></p></div>
    </div>
  </div>

  <div class="mb-3">
    <label>Check-In Date & Time</label>
    <input type="datetime-local" id="checkInTime" class="form-control">
  </div>

  <div class="mb-3">
    <label>Upload Guest Photo (optional)</label>
    <input type="file" class="form-control">
  </div>

  <div class="mb-3">
    <label>Upload ID Proof (optional)</label>
    <input type="file" class="form-control">
  </div>

  <button type="button" class="btn btn-checkin w-100 mt-2" onclick="checkInGuest()">
    ✅ Check-In Guest
  </button>
</div>

<script>
const API = "https://hal-backend-production.up.railway.app/api";

async function fetchBooking() {
  const bookingId = document.getElementById("bookingId").value.trim();
  if (!bookingId) { alert("Enter a Booking ID"); return; }

  try {
    const r = await fetch(`${API}/bookings/${bookingId}`);
    if (!r.ok) throw new Error();
    const b = await r.json();

    document.getElementById("infoGuest").textContent = b.guestName;
    document.getElementById("infoRoom").textContent = b.room?.roomNumber || 'Not assigned';
    document.getElementById("infoCheckIn").textContent = b.checkInDate;
    document.getElementById("infoCheckOut").textContent = b.checkOutDate;
    document.getElementById("infoStatus").textContent = b.status;
    document.getElementById("infoEmp").textContent = b.employee?.pbNo;
    document.getElementById("bookingInfo").style.display = "block";

    if (b.status !== "APPROVED") {
      alert("Warning: Booking status is " + b.status + ". Only APPROVED bookings can check in.");
    }
  } catch(e) {
    alert("Booking not found. Check the Booking ID.");
  }
}

async function checkInGuest() {
  const bookingId = document.getElementById("bookingId").value.trim();
  if (!bookingId) { alert("Fetch a booking first"); return; }

  try {
    const r = await fetch(`${API}/bookings/${bookingId}/checkin`, { method: "PUT" });
    const d = await r.json();
    if (d.result === "CHECKED_IN") {
      alert("✅ Guest Successfully Checked In!");
      window.location.href = "checkout.html";
    } else {
      alert("Error: " + JSON.stringify(d));
    }
  } catch(e) {
    alert("Cannot connect to server.");
  }
}

// Set current time as default
document.getElementById("checkInTime").value = new Date().toISOString().slice(0,16);
</script>
</body>
</html>
