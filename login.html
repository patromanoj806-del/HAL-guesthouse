<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HAL Guest House</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{height:100vh;overflow:hidden;display:flex;}
.left{width:62%;position:relative;overflow:hidden;background:#0f172a;}
.slide{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;animation:cf 20s linear infinite;}
.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}
@keyframes cf{0%{opacity:0;}5%{opacity:1;}25%{opacity:1;}30%{opacity:0;}100%{opacity:0;}}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;flex-direction:column;justify-content:flex-end;padding:50px;z-index:2;}
.overlay h1{color:white;font-size:52px;font-weight:800;line-height:1.1;}
.overlay h3{color:rgba(255,255,255,0.8);font-size:22px;margin-top:8px;}
.overlay p{color:rgba(255,255,255,0.55);font-size:15px;margin-top:10px;}
.right{width:38%;background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 100%);display:flex;align-items:center;justify-content:center;padding:30px;}
.card{width:100%;max-width:400px;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;color:white;}
.logo{display:block;margin:0 auto 16px;width:110px;background:rgba(255,255,255,0.92);padding:8px 10px;border-radius:12px;}
.card h3{text-align:center;font-weight:700;font-size:20px;margin-bottom:4px;}
.card p.sub{text-align:center;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px;}
.form-control{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);color:white;border-radius:12px;height:50px;font-size:14px;padding:0 16px;}
.form-control:focus{background:rgba(255,255,255,0.13);border-color:#00c8ff;box-shadow:0 0 0 3px rgba(0,200,255,0.15);color:white;}
.form-control::placeholder{color:rgba(255,255,255,0.35);}
.form-label{color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:6px;}
.btn-login{width:100%;height:50px;background:linear-gradient(135deg,#00c8ff,#0080ff);border:none;border-radius:12px;font-size:16px;font-weight:700;color:white;margin-top:8px;transition:.3s;letter-spacing:.3px;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,200,255,0.35);}
.btn-login:disabled{opacity:.6;transform:none;}
.msg-box{border-radius:10px;padding:11px 14px;font-size:13px;font-weight:500;margin-top:14px;display:none;text-align:center;}
.msg-error{background:rgba(220,38,38,0.2);color:#fca5a5;border:1px solid rgba(220,38,38,0.3);}
.msg-success{background:rgba(22,163,74,0.2);color:#86efac;border:1px solid rgba(22,163,74,0.3);}
.msg-loading{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider span{flex:1;height:1px;background:rgba(255,255,255,0.12);}
.divider p{color:rgba(255,255,255,0.35);font-size:12px;margin:0;}
.register-btn{width:100%;height:46px;background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:12px;font-size:14px;font-weight:600;color:rgba(255,255,255,0.75);transition:.3s;cursor:pointer;}
.register-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4);color:white;}
.stats{display:flex;justify-content:space-between;margin-top:22px;text-align:center;}
.stats div h5{color:white;font-weight:700;margin:0;}
.stats div small{color:rgba(255,255,255,0.45);font-size:11px;}
.clock{text-align:center;margin-top:16px;font-size:12px;color:#00c8ff;}
</style>
</head>
<body>
<div class="left">
  <img src="https://orbitshub.com/wp-content/uploads/2023/11/The-Secrets-of-HALs-Light-Combat-Aircraft-1536x838.jpg" class="slide">
  <img src="https://www.eurasiantimes.com/wp-content/uploads/2023/07/SU-30MKI-1.jpg" class="slide">
  <img src="https://imgproc.airliners.net/photos/airliners/3/5/6/2691653.jpg?v=v40" class="slide">
  <img src="https://orbitshub.com/wp-content/uploads/2023/11/The-Secrets-of-HALs-Light-Combat-Aircraft-1536x838.jpg" class="slide">
  <div class="overlay">
    <h1>HAL KORAPUT</h1>
    <h3>Guest House Management System</h3>
    <p>Digital Room Booking &nbsp;•&nbsp; Approval Workflow &nbsp;•&nbsp; Room Availability</p>
  </div>
</div>
<div class="right">
  <div class="card">
    <img src="https://th.bing.com/th/id/OIP.iEX9U9df1k-oeO1bUktfwwHaD5?w=341&h=180&c=7&r=0&o=7&pid=1.7&rm=3" class="logo" alt="HAL">
    <h3>Employee Login</h3>
    <p class="sub">Welcome to HAL Guest House Portal</p>

    <div class="mb-3">
      <label class="form-label">PB Number</label>
      <input type="text" id="pbNo" class="form-control" placeholder="Enter your PB Number" onkeydown="if(event.key==='Enter') login()">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">LOGIN</button>
    <div class="msg-box" id="msgBox"></div>

    <div class="divider"><span></span><p>New Employee?</p><span></span></div>
    <button class="register-btn" onclick="window.location.href='registration.html'">
      <i class="bi bi-person-plus me-2"></i>Create New Account
    </button>

    <div class="stats">
      <div><h5>50+</h5><small>Rooms</small></div>
      <div><h5>24/7</h5><small>Support</small></div>
      <div><h5>HAL</h5><small>Koraput Division</small></div>
    </div>
    <div class="clock" id="clock"></div>
  </div>
</div>

<script>
const API = "http://localhost:8080/api";

function showMsg(msg, type) {
  const el = document.getElementById("msgBox");
  el.className = "msg-box msg-" + type;
  el.textContent = msg;
  el.style.display = "block";
}

async function login() {
  const pbNo = document.getElementById("pbNo").value.trim();
  const password = document.getElementById("password").value;
  if (!pbNo || !password) { showMsg("Please enter PB Number and Password", "error"); return; }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Signing in...";
  showMsg("Authenticating...", "loading");

  try {
    const r = await fetch(`${API}/login/full`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pbNo, password})
    });
    const data = await r.json();
    if (data.result === "LOGIN_SUCCESS") {
      localStorage.setItem("pbNo", data.pbNo);
      localStorage.setItem("employeeName", data.employeeName);
      localStorage.setItem("role", data.role);
      localStorage.setItem("department", data.department || "");
      showMsg("Login successful! Redirecting...", "success");
      setTimeout(() => window.location.href = "dashboard1.html", 900);
    } else {
      showMsg("Invalid PB Number or Password. Please try again.", "error");
      btn.disabled = false; btn.textContent = "LOGIN";
    }
  } catch(e) {
    showMsg("Server not connected. Ensure Spring Boot is running on port 8080.", "error");
    btn.disabled = false; btn.textContent = "LOGIN";
  }
}

setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleString();
}, 1000);
</script>
</body>
</html>
